<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 要約ツール | Web記事・長文を瞬時に要約</title>
  <meta name="description" content="AIが長い記事やテキストを瞬時に日本語で要約します。Web記事のURLを貼るだけ、または長文テキストを入力するだけで要約完了。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="wrapper">
    <header class="header">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">AI <strong>要約ツール</strong></span>
      </div>
      <p class="tagline">Web記事・長文テキストをAIが瞬時に要約</p>
    </header>

    <main class="main">
      <div class="card input-card">
        <div class="tabs">
          <button class="tab active" data-tab="url">🌐 Web記事URL</button>
          <button class="tab" data-tab="text">📄 テキスト入力</button>
        </div>

        <div class="tab-panel active" id="panel-url">
          <div class="input-group">
            <label class="input-label">記事のURLを貼り付けてください</label>
            <input
              type="url"
              id="url-input"
              class="text-input"
              placeholder="https://..."
              autocomplete="off"
            >
          </div>
        </div>

        <div class="tab-panel" id="panel-text">
          <div class="input-group">
            <label class="input-label">要約したいテキストを入力してください</label>
            <textarea
              id="text-input"
              class="text-input textarea"
              placeholder="ここに長文テキストを貼り付けてください..."
              rows="8"
            ></textarea>
          </div>
        </div>

        <button class="summarize-btn" id="summarize-btn">
          <span class="btn-icon">✦</span>
          <span class="btn-text">要約する</span>
        </button>
      </div>

      <div class="card result-card" id="result-card">
        <div class="result-header">
          <h2 class="result-title">✨ 要約結果</h2>
          <button class="copy-btn" id="copy-btn">コピー</button>
        </div>
        <div class="result-body" id="result-body">
          <div class="placeholder">
            <div class="placeholder-icon">📋</div>
            <p>ここに要約結果が表示されます</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>Powered by Groq AI &nbsp;·&nbsp; <span id="char-count"></span></p>
    </footer>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
